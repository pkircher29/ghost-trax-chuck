name: Build GhostTrax

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.6.0+cpu torchaudio==2.6.0+cpu demucs faster-whisper scipy pyinstaller --index-url https://download.pytorch.org/whl/cpu
          python -m pip install pillow

      - name: Build binary
        run: ./build.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: GhostTrax-Linux
          path: dist/GhostTrax

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GhostTrax
          fail_on_unmatched: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.6.0+cpu torchaudio==2.6.0+cpu demucs faster-whisper scipy pyinstaller --index-url https://download.pytorch.org/whl/cpu
          python -m pip install pillow

      - name: Build EXE and installer
        run: build-windows.bat

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostTrax-Windows-EXE
          path: dist/GhostTrax.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GhostTrax-Windows-Installer
          path: GhostTrax_Setup.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GhostTrax.exe
            GhostTrax_Setup.exe
          fail_on_unmatched: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
