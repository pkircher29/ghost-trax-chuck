name: Build Stem Separator

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.6.0+cpu torchaudio==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu
          python -m pip install demucs scipy pyinstaller

      - name: Download ffmpeg for Windows
        run: |
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Get-ChildItem -Filter "ffmpeg-*" -Directory | Select-Object -First 1 | ForEach-Object {
            Copy-Item "$($_.FullName)\bin\ffmpeg.exe" -Destination ffmpeg.exe
          }

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller StemSeparator-windows.spec --clean

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        run: |
          $nsis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          & $nsis installer.nsi

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: StemSeparator-Windows-EXE
          path: dist/StemSeparator.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: StemSeparator-Windows-Setup
          path: StemSeparator_Setup.exe

      - name: Release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StemSeparator.exe
            StemSeparator_Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.6.0+cpu torchaudio==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu
          python -m pip install demucs scipy pyinstaller

      - name: Build binary
        run: ./build.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: StemSeparator-Linux
          path: dist/StemSeparator

      - name: Release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/StemSeparator
